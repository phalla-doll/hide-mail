<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HideMail</title>
    <style>
      :root {
        --bg: #ffffff;
        --surface: #f5f5f5;
        --surface-alt: #f9f9f9;
        --text: #333333;
        --text-muted: #666666;
        --primary: #4a90d9;
        --primary-hover: #3a7bc8;
        --danger: #e74c3c;
        --danger-hover: #c0392b;
        --border: #dddddd;
        --border-subtle: rgba(0, 0, 0, 0.14);
        --focus-ring: 0 0 0 3px rgba(74, 144, 217, 0.2);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1a1a;
          --surface: #2a2a2a;
          --surface-alt: #333333;
          --text: #e5e5e5;
          --text-muted: #a0a0a0;
          --primary: #5aa0e9;
          --primary-hover: #4a90d9;
          --border: #444444;
          --border-subtle: rgba(255, 255, 255, 0.18);
          --focus-ring: 0 0 0 3px rgba(90, 160, 233, 0.25);
        }
      }
      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        min-width: 300px;
        max-width: 340px;
        padding: 14px;
        background: var(--bg);
        color: var(--text);
      }
      h3 {
        margin-bottom: 14px;
        font-size: 18px;
        line-height: 1.2;
        letter-spacing: -0.01em;
        color: var(--text);
        text-wrap: balance;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
        padding: 12px;
        background: var(--surface);
        border: 1px solid var(--border-subtle);
        border-radius: 0;
        transition-property: border-color, transform;
        transition-duration: 180ms;
        transition-timing-function: cubic-bezier(0.2, 0, 0, 1);
      }
      .toggle-row:hover {
        border-color: var(--border);
      }
      .toggle-row label {
        font-size: 14px;
        color: var(--text);
        flex: 1;
        text-wrap: pretty;
      }
      .toggle-row input[type="checkbox"] {
        width: 22px;
        height: 22px;
        min-width: 22px;
        min-height: 22px;
        accent-color: var(--primary);
        cursor: pointer;
      }
      .form-row {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 10px;
      }
      input[type="text"] {
        min-height: 42px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 0;
        font-size: 14px;
        background: var(--bg);
        color: var(--text);
        transition-property: border-color, box-shadow, background-color;
        transition-duration: 150ms;
        transition-timing-function: ease-out;
      }
      input[type="text"]::placeholder {
        color: var(--text-muted);
        text-wrap: pretty;
      }
      input[type="text"]:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: var(--focus-ring);
      }
      input[type="text"]:focus-visible {
        outline: none;
      }
      button {
        min-height: 40px;
        padding: 10px 14px;
        background-color: var(--primary);
        color: #fff;
        border: 1px solid transparent;
        border-radius: 0;
        font-size: 14px;
        cursor: pointer;
        font-weight: 500;
        transition-property: background-color, transform, box-shadow;
        transition-duration: 150ms;
        transition-timing-function: cubic-bezier(0.2, 0, 0, 1);
      }
      button:focus-visible {
        outline: none;
        box-shadow: var(--focus-ring);
      }
      button:hover {
        background-color: var(--primary-hover);
      }
      button:active {
        transform: scale(0.96);
      }
      #add {
        width: 100%;
        margin-top: 2px;
      }
      .rules-list {
        margin-top: 14px;
        list-style: none;
      }
      .rules-list li {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        background: var(--surface-alt);
        border: 1px solid var(--border-subtle);
        border-radius: 0;
        margin-bottom: 8px;
        font-size: 13px;
        animation: fadeInUp 260ms cubic-bezier(0.2, 0, 0, 1) backwards;
      }
      .rules-list li:nth-child(1) { animation-delay: 0ms; }
      .rules-list li:nth-child(2) { animation-delay: 100ms; }
      .rules-list li:nth-child(3) { animation-delay: 200ms; }
      .rules-list li:nth-child(4) { animation-delay: 300ms; }
      .rules-list li:nth-child(5) { animation-delay: 400ms; }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(10px);
          filter: blur(3px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
          filter: blur(0);
        }
      }
      .rules-list li input[type="checkbox"] {
        width: 20px;
        height: 20px;
        min-width: 20px;
        min-height: 20px;
        flex-shrink: 0;
        accent-color: var(--primary);
        cursor: pointer;
      }
      .rules-list .rule-text {
        flex: 1;
        min-width: 0;
        word-break: break-word;
        text-wrap: pretty;
        line-height: 1.3;
      }
      .rules-list .delete-btn {
        min-height: 28px;
        min-width: 28px;
        width: 28px;
        padding: 0;
        background-color: var(--danger);
        font-size: 18px;
        font-weight: 500;
        border: 1px solid transparent;
        border-radius: 0;
        line-height: 1;
        margin-left: auto;
        flex-shrink: 0;
        align-self: center;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .rules-list .delete-btn:hover {
        background-color: var(--danger-hover);
      }
      .empty-state {
        display: block;
        text-align: center;
        color: var(--text-muted);
        font-size: 13px;
        padding: 18px 12px;
        text-wrap: pretty;
      }
      .options-link {
        width: 100%;
        margin-top: 12px;
        text-align: center;
        font-size: 13px;
        color: var(--text);
        background-color: var(--surface);
        border: 1px solid var(--border-subtle);
      }
      .options-link:hover {
        background-color: var(--surface-alt);
        border-color: var(--border);
      }
    </style>
  </head>
  <body>
    <h3>HideMail</h3>

    <div class="toggle-row">
      <input type="checkbox" id="enabled" />
      <label for="enabled">Enable</label>
    </div>

    <div class="form-row">
      <input type="text" id="email" placeholder="email to hide (e.g. user@example.com)" />
    </div>

    <div class="form-row">
      <input type="text" id="replacement" placeholder="replacement (e.g. hidden email)" />
    </div>

    <button id="add">Add Rule</button>

    <ul id="rules" class="rules-list"></ul>

    <button id="openOptions" class="options-link">Open Options</button>

    <script src="popup.js"></script>
  </body>
</html>
