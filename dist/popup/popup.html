<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HideMail</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        min-width: 300px;
        padding: 16px;
        background: #fff;
      }
      h3 {
        margin-bottom: 16px;
        font-size: 18px;
        color: #333;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
        padding: 12px;
        background: #f5f5f5;
        border-radius: 8px;
      }
      .toggle-row label {
        font-size: 14px;
        color: #333;
        flex: 1;
      }
      .toggle-row input[type="checkbox"] {
        width: 20px;
        height: 20px;
      }
      .form-row {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 12px;
      }
      input[type="text"] {
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
      }
      input[type="text"]:focus {
        outline: none;
        border-color: #4a90d9;
      }
      button {
        padding: 10px 16px;
        background: #4a90d9;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        font-weight: 500;
      }
      button:hover {
        background: #3a7bc8;
      }
      .rules-list {
        margin-top: 16px;
        list-style: none;
      }
      .rules-list li {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px;
        background: #f9f9f9;
        border-radius: 6px;
        margin-bottom: 8px;
        font-size: 13px;
      }
      .rules-list li input[type="checkbox"] {
        width: 16px;
        height: 16px;
      }
      .rules-list .rule-text {
        flex: 1;
        word-break: break-all;
      }
      .rules-list .delete-btn {
        background: #e74c3c;
        padding: 4px 8px;
        font-size: 12px;
      }
      .delete-btn:hover {
        background: #c0392b;
      }
      .empty-state {
        text-align: center;
        color: #888;
        font-size: 13px;
        padding: 20px;
      }
      .options-link {
        display: block;
        margin-top: 16px;
        text-align: center;
        font-size: 13px;
        color: #4a90d9;
        text-decoration: none;
      }
      .options-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h3>HideMail</h3>

    <div class="toggle-row">
      <input type="checkbox" id="enabled" />
      <label for="enabled">Enable hiding</label>
    </div>

    <div class="form-row">
      <input type="text" id="email" placeholder="email to hide (e.g. user@example.com)" />
    </div>

    <div class="form-row">
      <input type="text" id="replacement" placeholder="replacement (e.g. hidden email)" />
    </div>

    <button id="add">Add Rule</button>

    <ul id="rules" class="rules-list"></ul>

    <a href="options/options.html" target="_blank" class="options-link">Open Options</a>

    <script src="popup.js"></script>
  </body>
</html>
