<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HideMail Options</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 600px;
        margin: 0 auto;
        padding: 24px;
        background: #fff;
      }
      h2 {
        margin-bottom: 24px;
        font-size: 24px;
        color: #333;
      }
      h3 {
        margin: 24px 0 12px;
        font-size: 16px;
        color: #333;
      }
      .section {
        padding: 16px;
        background: #f9f9f9;
        border-radius: 8px;
        margin-bottom: 16px;
      }
      .form-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      .form-row label {
        font-size: 14px;
        color: #333;
        min-width: 100px;
      }
      select, input[type="text"] {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
      }
      select:focus, input[type="text"]:focus {
        outline: none;
        border-color: #4a90d9;
      }
      button {
        padding: 10px 16px;
        background: #4a90d9;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        font-weight: 500;
      }
      button:hover {
        background: #3a7bc8;
      }
      button.secondary {
        background: #6c757d;
      }
      button.secondary:hover {
        background: #5a6268;
      }
      .domain-list {
        list-style: none;
        margin-top: 12px;
      }
      .domain-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        background: #fff;
        border-radius: 4px;
        margin-bottom: 6px;
        font-size: 13px;
      }
      .domain-list .remove-btn {
        background: #e74c3c;
        padding: 4px 8px;
        font-size: 12px;
      }
      .domain-list .remove-btn:hover {
        background: #c0392b;
      }
      .save-status {
        margin-top: 12px;
        padding: 8px 12px;
        border-radius: 4px;
        font-size: 13px;
        display: none;
      }
      .save-status.success {
        display: block;
        background: #d4edda;
        color: #155724;
      }
    </style>
  </head>
  <body>
    <h2>HideMail Options</h2>

    <div class="section">
      <h3>General</h3>
      <div class="form-row">
        <label for="enabled">Enable Extension</label>
        <input type="checkbox" id="enabled" />
      </div>
    </div>

    <div class="section">
      <h3>Site Filtering</h3>
      <div class="form-row">
        <label for="siteMode">Mode</label>
        <select id="siteMode">
          <option value="all">Work on all sites</option>
          <option value="allowlist">Allowlist only</option>
          <option value="blocklist">Blocklist (exclude)</option>
        </select>
      </div>

      <div id="allowlistSection" style="display: none;">
        <div class="form-row">
          <input type="text" id="allowlistInput" placeholder="domain.com" />
          <button id="addAllowlist">Add</button>
        </div>
        <ul id="allowlist" class="domain-list"></ul>
      </div>

      <div id="blocklistSection" style="display: none;">
        <div class="form-row">
          <input type="text" id="blocklistInput" placeholder="domain.com" />
          <button id="addBlocklist">Add</button>
        </div>
        <ul id="blocklist" class="domain-list"></ul>
      </div>
    </div>

    <div class="save-status" id="saveStatus">Settings saved!</div>

    <script src="options.js"></script>
  </body>
</html>
